<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <title>John's Diner</title>
</head>
<body>
    <div class="hero">
        <h1>John's Diner</h1>
        <h2>Enjoy food made for moment's</h2>
    </div> 
    <div class="items" id="items-list">
    </div>
    <div class="order-list order-display" id="order-list">
        <h3>Your Order</h3>
    </div> 
    <div class="total-display total-hidden" id="order-total">
        <p class="total">Total</p>
    </div>
    <div class='total-hidden checkout' id="checkout-div">
        <button class='checkout-btn'><img src="./img/shopping-cart-icon.png" class="cart-svg" alt="Search" width="25" height="25">Checkout</button>
    </div>
    <div class="form-container" id="myForm">
        <form>
            <p>Enter Your Details Here:</p>
            <input type="text" id="name" placeholder="Enter Your Name">
            <input type="number" id="card" placeholder="Enter Your Card Number">
            <input type="number" id="cvv" placeholder="Enter Your Card CVV">
        </form>
    </div>

    <script type="module" src="./index.js"></script>
</body>
</html>
