<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Convertor</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="hero">
            <p class="hero-title">Metric/Imperial Converter</p>
            <input type="text" id="input">
            <button id="convert-btn">Convert</button>
        </div>
        <div id="results">
            <div id="length">
                <h2 class="value-text">Length (Meters/Feet)</h2>
            </div>
            <div id="volume">
                <h2 class="value-text">Volume (Liters/Gallons)</h2>
            </div>
            <div id="mass">
                <h2 class="value-text">Mass (Kilograms/Pounds)</h2>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
