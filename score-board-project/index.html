<html>
    <head>
        <link rel="stylesheet" href="./style.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 class="team-name">HOME</h3>
                <div class="score-board"><p class="score" id="home-score"></p></div>
                <div class="btn-container">
                    <button class="btn" id="add1home" onclick="add1home()">+1</button>
                    <button class="btn" id="add2home" onclick="add2home()">+2</button>
                    <button class="btn" id="add3home" onclick="add3home()">+3</button>
                </div>
            </div>
            <div>
                <h3 class="team-name">GUEST</h3>
                <div class="score-board"><p class="score" id="guest-score"></p></div>
                <div class="btn-container">
                    <button class="btn" id="add1-guest" onclick="add1Guest()">+1</button>
                    <button class="btn" id="add2-guest" onclick="add2Guest()">+2</button>
                    <button class="btn" id="add3-guest" onclick="add3Guest()">+3</button>
                </div>
            </div>
        </div>
        <div class="reset-btn-container">
                <button class="reset-btn" onclick="reset()">New Game</button>
            </div>
        <script src="index.js"></script>
    </body>
</html>
